<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{ $description := cond (ne .Description "") .Description site.Params.description }}
{{ $title := cond .IsHome site.Title (printf "%s | %s" .Title site.Title) }}
<meta name="description" content="{{ $description }}">
<meta name="author" content="{{ site.Params.author }}">
<meta name="google-site-verification" content="wlhqXAdJHsRZAJ4O3V4q7vSrsThK0YVv6oEyAJ5GFSM">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ $title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ site.Title }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ $title }}">
<meta name="twitter:description" content="{{ $description }}">
<title>{{ $title }}</title>
{{ if eq .RelPermalink "/" }}
<link rel="preload" as="image" href="{{ "images/donggyu-profile-768.webp" | relURL }}" imagesrcset="{{ "images/donggyu-profile-480.webp" | relURL }} 480w, {{ "images/donggyu-profile-768.webp" | relURL }} 768w, {{ "images/donggyu-profile.webp" | relURL }} 960w" imagesizes="(max-width: 860px) min(420px, 100vw - 40px), 430px" type="image/webp">
{{ end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
